name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare database template
        run: |
          npx prisma migrate deploy
          npm run db:seed
        env:
          DATABASE_URL: file:./dev.db
          JWT_SECRET: hoterra-hdms-ci-secret

      - name: Verify seeded database
        run: |
          if (!(Test-Path "prisma/dev.db")) { throw "Seeded database prisma/dev.db not found" }
          $size = (Get-Item "prisma/dev.db").Length
          Write-Host "Seeded DB size: $size bytes"
          if ($size -lt 16384) { throw "Seeded database looks empty ($size bytes)" }

      - name: Verify Prisma client bundle
        run: |
          if (!(Test-Path "node_modules/.prisma/client/default.js")) { throw "Prisma client not generated" }
          if (!(Test-Path "node_modules/@prisma/client/runtime/library.js")) { throw "Prisma runtime missing" }
          Get-ChildItem "node_modules/.prisma/client" | Select-Object Name
          Get-ChildItem "node_modules/@prisma/client/runtime" | Select-Object Name

      - name: Build application
        run: npm run build:app
        env:
          DATABASE_URL: file:./dev.db

      - name: Build Windows installer
        run: npm run dist:win

      - name: Verify packaged Prisma bundle
        run: |
          $client = "release/win-unpacked/resources/prisma/generated-client/default.js"
          $runtime = "release/win-unpacked/resources/prisma/npm-client/runtime/library.js"
          $templateDb = "release/win-unpacked/resources/database/hoterra-template.db"
          if (!(Test-Path $client)) { throw "Packaged Prisma client missing: $client" }
          if (!(Test-Path $runtime)) { throw "Packaged Prisma runtime missing: $runtime" }
          if (!(Test-Path $templateDb)) { throw "Packaged template DB missing: $templateDb" }
          $dbSize = (Get-Item $templateDb).Length
          Write-Host "Packaged template DB size: $dbSize bytes"
          if ($dbSize -lt 16384) { throw "Packaged template DB looks empty ($dbSize bytes)" }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HOTERRA-HDMS-Windows
          path: |
            release/*.exe
            release/*.msi
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: HOTERRA HDMS v1.0.${{ github.run_number }}
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
